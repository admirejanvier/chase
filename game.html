<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO CYCLIST · 3D BIKE RIDER</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid #f39c12;
            pointer-events: none;
            z-index: 10;
            display: flex;
            gap: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #hud span {
            color: #f1c40f;
            font-weight: 700;
            font-size: 1.4em;
            margin-left: 8px;
        }
        #speedometer {
            display: flex;
            align-items: center;
        }
        #odometer {
            display: flex;
            align-items: center;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            z-index: 10;
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .key {
            background: rgba(20,20,20,0.9);
            border-radius: 8px;
            padding: 6px 16px;
            margin: 0 5px;
            font-weight: 700;
            color: #f39c12;
            border: 1px solid #f39c1233;
            box-shadow: 0 4px 0 #0a0a0a;
        }
        #game-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }
        #message {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 30px 60px;
            border-radius: 80px;
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: 2px solid #f39c12;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: 0.3s;
            pointer-events: none;
            text-align: center;
        }
        #message small {
            display: block;
            font-size: 1rem;
            color: #ccc;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            transition: 0.3s;
        }
        #reset-btn {
            position: absolute;
            bottom: 120px;
            right: 30px;
            background: #e67e22;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 8px 0 #b45d1a;
            transition: 0.08s linear;
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }
        #reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b45d1a;
        }
        #reset-btn:hover {
            background: #f39c12;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="speedometer">⚡ SPEED <span id="speed-value">0</span> km/h</div>
        <div id="odometer">📏 DISTANCE <span id="distance-value">0</span> m</div>
    </div>

    <div id="controls">
        <span><span class="key">⬆️</span> ACCEL</span>
        <span><span class="key">⬇️</span> BRAKE</span>
        <span><span class="key">⬅️ ➡️</span> STEER</span>
        <span><span class="key">R</span> RESPAWN</span>
    </div>

    <button id="reset-btn">🔄 NEW RIDE</button>

    <div id="game-overlay">
        <div id="message" class="hidden">🏁 READY? <small>USE ARROWS – STAY ON ROAD</small></div>
    </div>

    <!-- Three.js will insert canvas here -->
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- setup scene, camera, renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff); // sky blue
        scene.fog = new THREE.Fog(0xaaccff, 30, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(20, 30, 10);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 30;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 50;
        scene.add(sunLight);

        const fillLight = new THREE.PointLight(0xccddff, 0.5);
        fillLight.position.set(-5, 10, 15);
        scene.add(fillLight);

        // --- ground & road (professional environment) ---
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a6b4b });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // grass patches (small detail)
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x4caf7a });
        for (let i = 0; i < 80; i++) {
            const patch = new THREE.Mesh(new THREE.CircleGeometry(0.8 + Math.random()*1.2, 5), grassMat);
            patch.rotation.x = -Math.PI/2;
            patch.position.x = (Math.random() - 0.5) * 160;
            patch.position.z = (Math.random() - 0.5) * 160;
            patch.position.y = 0;
            patch.receiveShadow = true;
            scene.add(patch);
        }

        // road (straight track with markings)
        const roadLength = 120;
        const roadWidth = 4.2;
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7, metalness: 0.1 });
        const road = new THREE.Mesh(new THREE.BoxGeometry(roadLength, 0.1, roadWidth), roadMat);
        road.position.set(0, 0, 0);
        road.receiveShadow = true;
        road.castShadow = false;
        scene.add(road);

        // road lines (white dashes)
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, emissive: 0x332100 });
        for (let z = -roadLength/2 + 2; z < roadLength/2; z += 5) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(1, 0.11, 0.8), lineMat);
            line.position.set(0, 0.06, z);
            line.castShadow = true;
            line.receiveShadow = false;
            scene.add(line);
        }

        // edge lines (red/white)
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
        for (let side = -1; side <= 1; side += 2) {
            for (let z = -roadLength/2; z <= roadLength/2; z += 1.5) {
                const edge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.5), edgeMat);
                edge.position.set(side * (roadWidth/2 + 0.3), 0.05, z);
                edge.castShadow = true;
                edge.receiveShadow = false;
                scene.add(edge);
            }
        }

        // trees / environment
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2.5), trunkMat);
            trunk.position.y = 1.25;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            const leaves1 = new THREE.Mesh(new THREE.ConeGeometry(1.0, 1.8, 8), leafMat);
            leaves1.position.y = 2.8;
            leaves1.castShadow = true;
            leaves1.receiveShadow = true;
            group.add(leaves1);
            const leaves2 = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.5, 6), leafMat);
            leaves2.position.y = 4.0;
            leaves2.castShadow = true;
            leaves2.receiveShadow = true;
            group.add(leaves2);
            group.position.set(x, 0, z);
            return group;
        }

        for (let i = -3; i <= 3; i+=1.5) {
            if (Math.abs(i) < 1.2) continue;
            scene.add(createTree(i * 6, -35));
            scene.add(createTree(i * 6, 35));
        }

        // distant mountains / clouds (just simple)
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 });
        for (let k = 0; k < 10; k++) {
            const cloud = new THREE.Mesh(new THREE.SphereGeometry(2 + Math.random()*3, 7), cloudMat);
            cloud.position.set((k-5)*12, 10 + Math.random()*5, -45 + Math.random()*20);
            cloud.castShadow = true;
            scene.add(cloud);
        }

        // --- BIKE construction (professional detail) ---
        const bikeGroup = new THREE.Group();

        // frame (main triangle)
        const frameMat = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.3, metalness: 0.4, emissive: 0x220000 });
        const tubeGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.8);
        
        // top tube
        const topTube = new THREE.Mesh(tubeGeo, frameMat);
        topTube.rotation.z = 0.2;
        topTube.rotation.x = 0.1;
        topTube.position.set(0.2, 0.9, 0);
        topTube.castShadow = true;
        bikeGroup.add(topTube);
        
        // down tube
        const downTube = new THREE.Mesh(tubeGeo, frameMat);
        downTube.rotation.z = -0.4;
        downTube.rotation.x = 0.1;
        downTube.position.set(-0.2, 0.4, 0);
        downTube.castShadow = true;
        bikeGroup.add(downTube);
        
        // seat tube
        const seatTube = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.2), frameMat);
        seatTube.rotation.x = 0.1;
        seatTube.position.set(-0.7, 0.8, 0);
        seatTube.castShadow = true;
        bikeGroup.add(seatTube);

        // seat
        const seatMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.3), seatMat);
        seat.position.set(-0.8, 1.4, 0);
        seat.castShadow = true;
        bikeGroup.add(seat);

        // handlebar
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8), handleMat);
        bar.rotation.z = 0.3;
        bar.position.set(0.7, 1.15, 0);
        bar.castShadow = true;
        bikeGroup.add(bar);
        
        // grips
        const gripMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const gripL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.3), gripMat);
        gripL.position.set(1.1, 1.2, -0.2);
        gripL.rotation.z = 0.3;
        gripL.castShadow = true;
        bikeGroup.add(gripL);
        const gripR = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.3), gripMat);
        gripR.position.set(1.1, 1.2, 0.2);
        gripR.rotation.z = 0.3;
        gripR.castShadow = true;
        bikeGroup.add(gripR);

        // wheels (with spokes effect)
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const tireMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.9 });
        const spokeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });

        function createWheel(posX, posZ) {
            const wheelGroup = new THREE.Group();
            // tire
            const tire = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.12, 16, 32), tireMat);
            tire.rotation.x = Math.PI/2;
            tire.castShadow = true;
            tire.receiveShadow = true;
            wheelGroup.add(tire);
            // rim
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.1, 16), wheelMat);
            rim.rotation.x = 0;
            rim.castShadow = true;
            rim.receiveShadow = true;
            rim.position.y = 0;
            wheelGroup.add(rim);
            // spokes (simple cross)
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.7, 0.05), spokeMat);
                spoke.rotation.z = angle;
                spoke.position.y = 0;
                spoke.castShadow = true;
                wheelGroup.add(spoke);
            }
            wheelGroup.position.set(posX, 0.5, posZ);
            return wheelGroup;
        }

        const frontWheel = createWheel(0.9, 0);
        const rearWheel = createWheel(-0.9, 0);
        bikeGroup.add(frontWheel);
        bikeGroup.add(rearWheel);

        // chain / gear detail
        const chainMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 });
        const chainRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.05, 8, 20), chainMat);
        chainRing.rotation.x = Math.PI/2;
        chainRing.rotation.z = 0.5;
        chainRing.position.set(-0.4, 0.35, 0);
        chainRing.castShadow = true;
        bikeGroup.add(chainRing);

        // rider (simple stylized)
        const riderMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
        
        // torso
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.8), riderMat);
        torso.position.set(-0.2, 1.3, 0);
        torso.castShadow = true;
        bikeGroup.add(torso);
        
        // head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.22), skinMat);
        head.position.set(-0.2, 1.8, 0);
        head.castShadow = true;
        bikeGroup.add(head);
        
        // helmet
        const helmet = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.25, 8), helmetMat);
        helmet.position.set(-0.2, 1.95, 0);
        helmet.castShadow = true;
        bikeGroup.add(helmet);
        
        // arms
        const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.6);
        const leftArm = new THREE.Mesh(armGeo, riderMat);
        leftArm.position.set(0.3, 1.5, -0.2);
        leftArm.rotation.z = -0.4;
        leftArm.castShadow = true;
        bikeGroup.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, riderMat);
        rightArm.position.set(0.3, 1.5, 0.2);
        rightArm.rotation.z = -0.4;
        rightArm.castShadow = true;
        bikeGroup.add(rightArm);

        // legs
        const legGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.7);
        const leftLeg = new THREE.Mesh(legGeo, riderMat);
        leftLeg.position.set(-0.6, 0.7, -0.2);
        leftLeg.rotation.x = 0.1;
        leftLeg.castShadow = true;
        bikeGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(legGeo, riderMat);
        rightLeg.position.set(-0.6, 0.7, 0.2);
        rightLeg.rotation.x = 0.1;
        rightLeg.castShadow = true;
        bikeGroup.add(rightLeg);

        // add bike to scene
        bikeGroup.position.set(0, 0.15, 0);
        bikeGroup.rotation.y = Math.PI; // face initial direction
        scene.add(bikeGroup);

        // --- game state variables ---
        let speed = 0;
        let distance = 0;
        const maxSpeed = 28;
        const acceleration = 0.4;
        const brakeDecel = 0.6;
        const turnSpeed = 0.025;
        let steer = 0;

        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        // position & rotation tracking
        let bikeWorldX = 0;
        let bikeWorldZ = 0;
        let bikeRotation = 0; // in radians

        // HUD elements
        const speedEl = document.getElementById('speed-value');
        const distanceEl = document.getElementById('distance-value');
        const messageEl = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');

        // starting message
        setTimeout(() => {
            messageEl.classList.remove('hidden');
            setTimeout(() => messageEl.classList.add('hidden'), 2000);
        }, 300);

        // --- input handling ---
        window.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                e.preventDefault();
            }
            // R key respawn
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
                e.preventDefault();
            }
        });

        resetBtn.addEventListener('click', resetGame);

        function resetGame() {
            speed = 0;
            distance = 0;
            bikeWorldX = 0;
            bikeWorldZ = 0;
            bikeRotation = Math.PI; // forward along Z negative? we'll adjust
            bikeGroup.position.set(0, 0.15, 0);
            bikeGroup.rotation.y = Math.PI;
            camera.position.set(5, 3, 10);
            camera.lookAt(bikeGroup.position);
            messageEl.innerText = '✨ NEW RIDE';
            messageEl.classList.remove('hidden');
            setTimeout(() => messageEl.classList.add('hidden'), 1200);
        }

        // camera follow (third person)
        function updateCamera() {
            const bikePos = bikeGroup.position.clone();
            const offset = new THREE.Vector3(5, 3, 7);
            offset.applyAxisAngle(new THREE.Vector3(0,1,0), bikeGroup.rotation.y - 0.2);
            const targetPos = bikePos.clone().add(offset);
            camera.position.lerp(targetPos, 0.1);
            camera.lookAt(bikePos.clone().add(new THREE.Vector3(0, 0.5, 0)));
        }

        // boundary check (road edges)
        function checkBoundary() {
            const halfWidth = roadWidth/2 - 0.6; // bike width tolerance
            if (Math.abs(bikeWorldX) > halfWidth) {
                // crashed / off road
                if (messageEl.classList.contains('hidden')) {
                    messageEl.innerText = '💥 OFF ROAD';
                    messageEl.classList.remove('hidden');
                    setTimeout(() => messageEl.classList.add('hidden'), 1000);
                }
                speed *= 0.7; // slow down heavily
                if (Math.abs(bikeWorldX) > halfWidth + 2) {
                    resetGame(); // too far, respawn
                }
            }
        }

        // --- animation loop ---
        function animate() {
            requestAnimationFrame(animate);

            // speed and steer based on keys
            if (keys.ArrowUp) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys.ArrowDown) speed = Math.max(speed - brakeDecel, 0);
            else speed *= 0.98; // friction

            // steering (only when moving)
            if (speed > 0.5) {
                if (keys.ArrowLeft) steer += turnSpeed * (speed / maxSpeed);
                if (keys.ArrowRight) steer -= turnSpeed * (speed / maxSpeed);
            } else {
                // no steering when stopped
                if (keys.ArrowLeft) bikeRotation += 0.01;
                if (keys.ArrowRight) bikeRotation -= 0.01;
            }

            // apply steering to bike rotation (invert for natural feel)
            bikeRotation += steer;
            steer *= 0.9; // damping

            // move bike forward in local direction
            const moveX = Math.sin(bikeRotation) * speed * 0.1;
            const moveZ = Math.cos(bikeRotation) * speed * 0.1;
            
            bikeWorldX += moveX;
            bikeWorldZ += moveZ;

            // update bike group position
            bikeGroup.position.x = bikeWorldX;
            bikeGroup.position.z = bikeWorldZ;
            bikeGroup.rotation.y = bikeRotation;

            // distance traveled (odometer)
            distance += Math.abs(speed) * 0.02;
            
            // update HUD
            speedEl.textContent = Math.floor(speed * 2.5); // fake km/h scaling
            distanceEl.textContent = Math.floor(distance);

            // simple boundary
            checkBoundary();

            // move environment slightly (infinite road feel) but keep within road length
            // we just teleport road if bike too far? for simplicity we just limit position
            if (Math.abs(bikeWorldZ) > 50) {
                // wrap around (infinite illusion)
                bikeWorldZ = -bikeWorldZ * 0.8;
                bikeGroup.position.z = bikeWorldZ;
            }

            updateCamera();

            renderer.render(scene, camera);
        }

        animate();

        // resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // small spin effect for wheels? we ignore for performance but could add later.
    </script>
</body>
</html>
